<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Warframe 遗物管理（Firebase 同步版）</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<style>
  body{font-family:"Microsoft YaHei",sans-serif;padding:20px;background:#f0f2f5;}
  input,select,button{font-family:"Microsoft YaHei",sans-serif;padding:6px;margin:4px 4px 4px 0;}
  .box{background:#fff;padding:12px;margin-bottom:12px;border-radius:6px;box-shadow:0 0 4px rgba(0,0,0,.05);}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:8px;}
  .item{border:1px solid #ddd;padding:6px;text-align:center;cursor:pointer;background:#fafafa;user-select:none;}
  .item:hover{background:#eef;}
  #contextMenu{position:absolute;display:none;background:#fff;border:1px solid #ccc;box-shadow:2px 2px 6px rgba(0,0,0,.15);z-index:9999;}
  #contextMenu div{padding:6px 12px;cursor:pointer;}
  #contextMenu div:hover{background:#eee;}
</style>
</head>
<body>

<h2>物品管理系统（铜 / 银 / 金 · Firebase 同步版）</h2>

<div class="box">
  <label>排序：</label>
  <select id="sortType">
    <option value="name">按名称</option>
    <option value="qty">按数量</option>
  </select>
  <button onclick="render()">🔃 刷新</button>

  <span style="margin-left:20px">
    <input id="searchInput" placeholder="输入关键词搜索">
    <button onclick="search()">🔍 搜索</button>
  </span>

  <span style="margin-left:20px">
    <button onclick="exportExcel()">📤 导出 Excel</button>
  </span>
</div>

<div class="box">
  <h3>搜索结果（右键操作）</h3>
  <div id="searchResult" class="grid"></div>
</div>

<div id="rows" class="box"></div>

<div class="box">
  <h3>统计</h3>
  <div id="stats"></div>
</div>

<div id="contextMenu">
  <div onclick="menuAction(+1)">➕ +1</div>
  <div onclick="menuAction(-1)">➖ -1</div>
  <div onclick="menuAction(0)">🗑 清除</div>
  <div onclick="hideMenu()">❌ 取消</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA6-PfrFcpp-baDh_4oCTSWUNWUS0OC-3c",
  authDomain: "warframe-relic.firebaseapp.com",
  projectId: "warframe-relic",
  storageBucket: "warframe-relic.firebasestorage.app",
  messagingSenderId: "668875347806",
  appId: "1:668875347806:web:4c2913b2327b89530161cf",
  measurementId: "G-ERJ0JPSFLF"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const TYPES = ['铜','银','金'];
let selected = null;
let data = {铜:[],银:[],金:[]};

function isEnglish(str){ return /^[A-Za-z]/.test(str); }

function sortItems(items){
  const t = document.getElementById('sortType').value;
  if(t==='qty') return items.sort((a,b)=>b.qty-a.qty);
  return items.sort((a,b)=>{
    const aEn=isEnglish(a.name), bEn=isEnglish(b.name);
    if(aEn&&!bEn) return -1;
    if(!aEn&&bEn) return 1;
    return a.name.localeCompare(b.name,'zh-CN');
  });
}

function loadData(){
  db.collection('items').doc('data').onSnapshot(doc=>{
    if(doc.exists){
      data = doc.data();
      render();
      search();
    }
  });
}

function save(){
  db.collection('items').doc('data').set(data);
}

function render(){
  let html='';let total=0;
  TYPES.forEach(t=>{
    const items=sortItems(data[t]||[]);
    let sum=0;
    html+=`<h3>${t}</h3><div><input id="${t}_name"><input id="${t}_qty" type="number" value="1" style="width:60px"><button onclick="${t}.add()">➕ 新增</button></div><div class="grid">`;
    items.forEach(i=>{
      sum+=i.qty;
      html+=`<div class="item" oncontextmenu="showMenu(event,'${t}','${i.name}')">${i.name}<br>×${i.qty}</div>`;
    });
    html+='</div>';
    total+=sum;
  });
  document.getElementById('rows').innerHTML=html;
  document.getElementById('stats').innerHTML=`<b>总计：${total} 个</b>`;
}

function showMenu(e,type,name){
  e.preventDefault();
  selected={type,name};
  contextMenu.style.left=e.pageX+'px';
  contextMenu.style.top=e.pageY+'px';
  contextMenu.style.display='block';
}

function hideMenu(){ contextMenu.style.display='none'; }

function menuAction(delta){
  if(!selected) return;
  const list=data[selected.type];
  const item=list.find(i=>i.name===selected.name);
  if(item){
    if(delta===0) data[selected.type]=list.filter(i=>i.name!==selected.name);
    else item.qty+=delta;
  }
  hideMenu();
  save();
}

TYPES.forEach(t=>{
  window[t]={ add(){ update(t,+1); } };
});

function update(type,delta){
  const name=document.getElementById(`${type}_name`).value.trim();
  const qty=parseInt(document.getElementById(`${type}_qty`).value)||1;
  if(!name){alert('请输入物品名称');return;}
  const list=data[type];
  const item=list.find(i=>i.name===name);
  if(item) item.qty+=delta*qty;
  else if(delta>0) list.push({name,qty});
  data[type]=list.filter(i=>i.qty>0);
  save();
}

function search(){
  const kw=document.getElementById('searchInput').value.trim().toLowerCase();
  const box=document.getElementById('searchResult');
  if(!kw){ box.innerHTML='<i>（输入关键词后显示结果）</i>'; return; }
  let html='';
  TYPES.forEach(t=>(data[t]||[]).forEach(i=>{
    if(i.name.toLowerCase().includes(kw))
      html+=`<div class="item" oncontextmenu="showMenu(event,'${t}','${i.name}')">${i.name}<br>×${i.qty}</div>`;
  }));
  box.innerHTML=html||'<i>未找到匹配物品</i>';
}

function exportExcel(){
  const wb=XLSX.utils.book_new();
  TYPES.forEach(t=>{
    const ws=XLSX.utils.json_to_sheet(sortItems(data[t]).map(i=>({类别:t,物品:i.name,数量:i.qty})));
    XLSX.utils.book_append_sheet(wb,ws,t);
  });
  XLSX.writeFile(wb,'物品记录.xlsx');
}

loadData();
</script>
</body>
</html>
